{% extends "base.html" %}
{% block title %}Login — CyberScan AI{% endblock %}

{% block auth_content %}
<div class="auth-card">
  <div class="auth-logo">
    <div class="brand-icon large"><i class="fas fa-shield-halved"></i></div>
    <h1>Cyber<span class="accent">Scan</span> AI</h1>
    <p>AI-Powered Web Vulnerability Scanner</p>
  </div>

  <form method="POST" action="/login" class="auth-form">
    <h2>Sign In</h2>
    <p class="auth-sub">Access your security dashboard</p>

    <div class="form-group">
      <label><i class="fas fa-user"></i> Username</label>
      <input type="text" name="username" id="username" placeholder="Enter username"
             required autocomplete="username"/>
    </div>

    <div class="form-group">
      <label><i class="fas fa-lock"></i> Password</label>
      <div class="input-pw-wrap">
        <input type="password" name="password" id="password" placeholder="Enter password"
               required autocomplete="current-password"/>
        <button type="button" class="pw-toggle" onclick="togglePw('password')">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-auth">
      <i class="fas fa-right-to-bracket"></i> Login
    </button>

    <p class="auth-switch">
      Don't have an account? <a href="/register">Register here</a>
    </p>
  </form>

  <div class="auth-note">
    <i class="fas fa-triangle-exclamation"></i>
    For authorised security testing only.
  </div>
</div>

<script>
function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
